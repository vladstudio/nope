<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="base.css">
<style>
body { width: 300px; }
.switcher {
  display: flex; align-items: center; justify-content: center; gap: 16px;
  padding: 16px 0;
}
.switcher img { width: 40px; height: 40px; transition: opacity 0.2s; }
.switcher img.dim { opacity: 0.25; }
.track {
  position: relative; width: 80px; height: 44px;
  background: var(--border); border-radius: 22px; cursor: pointer;
  transition: background 0.2s;
}
.track.on { background: var(--accent); }
.knob {
  position: absolute; top: 4px; left: 4px;
  width: 36px; height: 36px; background: #fff;
  border-radius: 50%; transition: left 0.2s;
}
.track.on .knob { left: 40px; }
.footer {
  display: flex; justify-content: space-between; margin-top: 12px;
  font-size: 12px;
}
#editor { display: none; margin-top: 12px; }
#domains {
  width: 100%; height: 120px; padding: 8px; border-radius: 8px;
  font-family: monospace; font-size: 12px;
}
#save { display: block; width: 100%; margin-top: 8px; border-radius: 8px; }
#status { text-align: center; margin-top: 6px; font-size: 11px; color: #22c55e; display: none; }
</style>
</head>
<body>
  <div class="switcher">
    <img id="iconOff" src="icon/nope-off.svg" alt="off">
    <div class="track" id="toggle"><div class="knob"></div></div>
    <img id="iconOn" src="icon/nope-on.svg" alt="on">
  </div>
  <div class="footer">
    <a id="editLink">Edit blocked sites</a>
    <a href="https://nope.vlad.studio" target="_blank">Nope</a>
  </div>
  <div id="editor">
    <textarea id="domains" placeholder="example.com&#10;reddit.com&#10;twitter.com"></textarea>
    <button id="save">Save</button>
    <div id="status">Saved!</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
